<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой День</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.app-container{
width:100%;
max-width:500px;
background:#f5f5f5;
min-height:100vh;
box-shadow:0 0 40px rgba(0,0,0,.3);
}

.screen{
display:none;
min-height:100vh;
flex-direction:column;
}

.screen.active{display:flex}

.header{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
padding:20px;
text-align:center;
position:relative;
}

.back-btn{
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
width:40px;
height:40px;
border:none;
border-radius:50%;
background:rgba(255,255,255,.2);
color:white;
}

.dashboard-grid{
padding:20px;
display:grid;
gap:15px;
}

.card{
background:white;
padding:18px;
border-radius:15px;
display:flex;
gap:15px;
border:none;
cursor:pointer;
}

.card-icon{font-size:35px}

.bottom-nav{
display:flex;
background:white;
position:sticky;
bottom:0;
}

.nav-btn{
flex:1;
border:none;
background:none;
padding:12px;
color:#999;
}

.nav-btn.active{color:#667eea;font-weight:bold}

.screen-content{padding:20px;padding-bottom:80px}

.stat-card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:10px;
text-align:center;
}

.big-number{font-size:40px;color:#667eea}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#667eea;
color:white;
margin-top:10px;
cursor:pointer;
}

input{
width:100%;
padding:12px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="app-container">

<!-- DASHBOARD -->
<div id="dashboard" class="screen active">
<div class="header">
<h1>🏥 Мой День</h1>
<div id="date"></div>
</div>

<div class="dashboard-grid">

<button class="card" onclick="go('sleep')">😴 Сон</button>
<button class="card" onclick="go('water')">💧 Вода</button>
<button class="card" onclick="go('steps')">👟 Шаги</button>
<button class="card" onclick="go('mood')">😊 Настроение</button>
<button class="card" onclick="go('medicine')">💊 Лекарства</button>

</div>

<div class="bottom-nav">
<button class="nav-btn active" onclick="go('dashboard')">🏠</button>
<button class="nav-btn" onclick="go('stats')">📊</button>
<button class="nav-btn" onclick="go('profile')">👤</button>
</div>
</div>

<!-- SLEEP -->
<div id="sleep" class="screen">
<div class="header">
<button class="back-btn" onclick="go('dashboard')">←</button>
<h1>Сон</h1>
</div>
<div class="screen-content">
<div class="stat-card"><div class="big-number" id="sleepVal">0</div></div>
<input id="sleepInput">
<button class="btn" onclick="saveSleep()">Save</button>
</div>
</div>

<!-- WATER -->
<div id="water" class="screen">
<div class="header">
<button class="back-btn" onclick="go('dashboard')">←</button>
<h1>Вода</h1>
</div>
<div class="screen-content">
<div class="stat-card"><div class="big-number" id="waterVal">0</div></div>
<input id="waterInput">
<button class="btn" onclick="saveWater()">Save</button>
</div>
</div>

<!-- STEPS -->
<div id="steps" class="screen">
<div class="header">
<button class="back-btn" onclick="go('dashboard')">←</button>
<h1>Шаги</h1>
</div>
<div class="screen-content">
<div class="stat-card"><div class="big-number" id="stepsVal">0</div></div>
<input id="stepsInput">
<button class="btn" onclick="saveSteps()">Save</button>
</div>
</div>

<!-- MOOD -->
<div id="mood" class="screen">
<div class="header">
<button class="back-btn" onclick="go('dashboard')">←</button>
<h1>Настроение</h1>
</div>
<div class="screen-content">
<div class="stat-card"><div class="big-number" id="moodVal">😊</div></div>
<button class="btn" onclick="setMood('😊')">😊</button>
</div>
</div>

<!-- MEDICINE -->
<div id="medicine" class="screen">
<div class="header">
<button class="back-btn" onclick="go('dashboard')">←</button>
<h1>Лекарства</h1>
</div>
<div class="screen-content">
<input id="medInput">
<button class="btn" onclick="addMed()">Add</button>
</div>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("myday")) || {
sleep:0,water:0,steps:0,mood:"😊",med:[]
};

function save(){
localStorage.setItem("myday",JSON.stringify(data));
update();
}

function go(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
update();
}

function saveSleep(){
data.sleep=document.getElementById("sleepInput").value;
save();
}

function saveWater(){
data.water+=parseInt(document.getElementById("waterInput").value||0);
save();
}

function saveSteps(){
data.steps=document.getElementById("stepsInput").value;
save();
}

function setMood(m){
data.mood=m;
save();
}

function addMed(){
data.med.push(document.getElementById("medInput").value);
save();
}

function update(){
document.getElementById("sleepVal").textContent=data.sleep;
document.getElementById("waterVal").textContent=data.water;
document.getElementById("stepsVal").textContent=data.steps;
document.getElementById("moodVal").textContent=data.mood;
document.getElementById("date").textContent=new Date().toLocaleDateString();
}

update();

</script>

</body>
</html>
