<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой День</title>
</head>
<body style="margin:0;padding:0;font-family:Arial,sans-serif;background:#f0f4f8;">

<div id="main" style="max-width:500px;margin:0 auto;background:white;min-height:100vh;">

    <div style="background:linear-gradient(135deg,#4A90E2,#764ba2);color:white;padding:25px 20px;text-align:center;">
        <h1 style="margin:0;font-size:26px;">🏥 Мой День</h1>
        <p id="tarih" style="margin:5px 0 0;font-size:14px;opacity:0.9;"></p>
    </div>

    <div style="padding:20px;">

        <div onclick="window.location.href='#sleep'" style="background:#f8f9fa;border-radius:15px;padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:15px;cursor:pointer;border-left:5px solid #4A90E2;">
            <div style="font-size:40px;">😴</div>
            <div>
                <div style="font-size:18px;font-weight:bold;color:#333;">Сон</div>
                <div id="sleep-val" style="color:#888;">0 часов</div>
            </div>
        </div>

        <div onclick="window.location.href='#water'" style="background:#f8f9fa;border-radius:15px;padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:15px;cursor:pointer;border-left:5px solid #4A90E2;">
            <div style="font-size:40px;">💧</div>
            <div>
                <div style="font-size:18px;font-weight:bold;color:#333;">Вода</div>
                <div id="water-val" style="color:#888;">0 мл</div>
            </div>
        </div>

        <div onclick="window.location.href='#steps'" style="background:#f8f9fa;border-radius:15px;padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:15px;cursor:pointer;border-left:5px solid #4A90E2;">
            <div style="font-size:40px;">👟</div>
            <div>
                <div style="font-size:18px;font-weight:bold;color:#333;">Шаги</div>
                <div id="steps-val" style="color:#888;">0 шагов</div>
            </div>
        </div>

        <div onclick="window.location.href='#mood'" style="background:#f8f9fa;border-radius:15px;padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:15px;cursor:pointer;border-left:5px solid #4A90E2;">
            <div style="font-size:40px;">😊</div>
            <div>
                <div style="font-size:18px;font-weight:bold;color:#333;">Настроение</div>
                <div id="mood-val" style="color:#888;">Отличное</div>
            </div>
        </div>

        <div onclick="window.location.href='#medicine'" style="background:#f8f9fa;border-radius:15px;padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:15px;cursor:pointer;border-left:5px solid #4A90E2;">
            <div style="font-size:40px;">💊</div>
            <div>
                <div style="font-size:18px;font-weight:bold;color:#333;">Лекарства</div>
                <div id="med-val" style="color:#888;">0 активных</div>
            </div>
        </div>

    </div>

    <div style="text-align:center;padding:10px;color:#999;font-size:12px;margin-top:20px;">
        ННГУ им. Лобачевского | Группа 3825Б1ПР3
    </div>

</div>

<div id="notification" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#4CAF50;color:white;padding:15px 25px;border-radius:10px;font-size:16px;z-index:999;display:none;"></div>

<script>
// TARIH
document.getElementById('tarih').textContent = new Date().toLocaleDateString('ru-RU', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

// VERILERI YUKLE
var d = JSON.parse(localStorage.getItem('myday')) || { sleep: 0, water: 0, steps: 0, mood: '😊', meds: [] };
document.getElementById('sleep-val').textContent = d.sleep + ' часов';
document.getElementById('water-val').textContent = d.water + ' мл';
document.getElementById('steps-val').textContent = d.steps + ' шагов';
document.getElementById('mood-val').textContent = d.mood;
document.getElementById('med-val').textContent = d.meds.length + ' активных';

// URL DEGISINCE SAYFA YENILE
window.onhashchange = function() { location.reload(); };

// BILDIRIM
function notify(msg) {
    var n = document.getElementById('notification');
    n.textContent = msg; n.style.display = 'block';
    setTimeout(function() { n.style.display = 'none'; }, 2000);
}

// HASH KONTROL
var hash = window.location.hash.substring(1);

if (hash === 'sleep') {
    var saat = prompt('Сколько часов вы спали? (0-24)', d.sleep);
    if (saat !== null && !isNaN(saat) && saat >= 0 && saat <= 24) {
        d.sleep = parseInt(saat);
        localStorage.setItem('myday', JSON.stringify(d));
        notify('✅ Сон: ' + d.sleep + ' часов');
    }
    window.location.hash = '';
}

if (hash === 'water') {
    var ml = prompt('Сколько мл воды выпили?', '250');
    if (ml !== null && !isNaN(ml) && ml > 0) {
        d.water += parseInt(ml);
        localStorage.setItem('myday', JSON.stringify(d));
        notify('✅ +' + ml + ' мл воды');
    }
    window.location.hash = '';
}

if (hash === 'steps') {
    var adim = prompt('Сколько шагов прошли?', d.steps);
    if (adim !== null && !isNaN(adim) && adim >= 0) {
        d.steps = parseInt(adim);
        localStorage.setItem('myday', JSON.stringify(d));
        notify('✅ Шаги: ' + d.steps);
    }
    window.location.hash = '';
}

if (hash === 'mood') {
    var mood = prompt('Ваше настроение?\n\n😊 Отличное\n😐 Нормальное\n😢 Грустное\n\nВведите: 1, 2 или 3', '1');
    if (mood === '1') { d.mood = '😊 Отличное'; notify('✅ Настроение: 😊'); }
    if (mood === '2') { d.mood = '😐 Нормальное'; notify('✅ Настроение: 😐'); }
    if (mood === '3') { d.mood = '😢 Грустное'; notify('✅ Настроение: 😢'); }
    localStorage.setItem('myday', JSON.stringify(d));
    window.location.hash = '';
}

if (hash === 'medicine') {
    var ilac = prompt('Название лекарства:');
    if (ilac) {
        var zaman = prompt('Время приёма (например: 09:00):', '09:00');
        if (zaman) {
            d.meds.push({ name: ilac, time: zaman });
            localStorage.setItem('myday', JSON.stringify(d));
            notify('✅ Добавлено: ' + ilac);
        }
    }
    window.location.hash = '';
}
</script>

</body>
</html>
